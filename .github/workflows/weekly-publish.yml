name: Weekly publish

on:
  schedule:
    # Monday 06:00 Moscow time = 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Archive, promote with artifact inheritance, generate fresh template
        run: |
          node -e "
          const fs = require('fs');

          const old  = JSON.parse(fs.readFileSync('data.json',     'utf8'));
          const next = JSON.parse(fs.readFileSync('data-new.json', 'utf8'));

          // Guard: skip if data-new is not ahead of data (already published)
          if (next.meta.week <= old.meta.week) {
            console.log('SKIP: data-new week ' + next.meta.week + ' <= data week ' + old.meta.week + ', already published.');
            process.exit(0);
          }

          // 1. Archive published week
          const week = String(old.meta.week).padStart(2, '0');
          fs.mkdirSync('archive', { recursive: true });
          fs.writeFileSync('archive/week-' + week + '.json', JSON.stringify(old, null, 2));
          console.log('Archived week ' + week);

          // 2. Inherit artifacts from published data into WIP data (only where empty)
          ['active', 'control'].forEach(list => {
            (next.pilots[list] || []).forEach(p => {
              if (!p.artifact) {
                const src = (old.pilots[list] || []).find(o => o.id === p.id);
                if (src && src.artifact) {
                  p.artifact = src.artifact;
                  console.log('Inherited artifact for ' + p.id);
                }
              }
            });
          });

          // 3. Move active pilots without done → control before promoting
          const withDone    = next.pilots.active.filter(p => p.done);
          const withoutDone = next.pilots.active.filter(p => !p.done);
          const toControl   = withoutDone.map(({done, ...p}) => p);
          next.pilots.active  = withDone;
          next.pilots.control = [...toControl, ...next.pilots.control];
          console.log('Moved to control: ' + toControl.map(p => p.id).join(', '));

          // 4. Promote data-new → data.json
          fs.writeFileSync('data.json', JSON.stringify(next, null, 2));
          console.log('Promoted week ' + next.meta.week);

          // 5. Generate fresh data-new.json for next week (inherit artifacts, clear done)
          const fresh = JSON.parse(JSON.stringify(next));
          fresh.meta.week   += 1;
          fresh.meta.updated = new Date().toISOString();
          fresh.search.innovations_week = 0;
          fresh.search.items = [];
          fresh.infra.done      = [];
          fresh.infra.artifacts = [];
          fresh.vnd.no_data        = false;
          fresh.vnd.no_data_reason = '';
          fresh.vnd.items          = [];
          fresh.pr.focus          = '';
          fresh.pr.media_internal = null;
          fresh.pr.media_external = null;
          fresh.pr.community_new  = null;
          fresh.pr.cards          = [];
          fresh.pr.next_event     = null;
          // Active pilots start each week fresh — clear both done and artifact
          (fresh.pilots.active || []).forEach(p => { p.done = ''; p.artifact = ''; });
          // Control pilots keep artifact for reference, only clear done
          (fresh.pilots.control || []).forEach(p => { p.done = ''; });
          fs.writeFileSync('data-new.json', JSON.stringify(fresh, null, 2));
          console.log('Generated fresh template for week ' + fresh.meta.week);
          "

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data-new.json archive/
          WEEK=$(node -p "JSON.parse(require('fs').readFileSync('data.json','utf8')).meta.week")
          git diff --cached --quiet || git commit -m "chore: publish week ${WEEK}"
          git push
