name: Weekly publish

on:
  schedule:
    # Every Saturday at 08:00 Moscow time (05:00 UTC)
    - cron: '0 5 * * 6'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Promote data-new.json → data.json
        run: cp data-new.json data.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: publish week $(date +%V) data"
          git push
